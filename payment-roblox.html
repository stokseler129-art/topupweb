<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pembayaran</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

<style>
body{
  font-family:Poppins;
  background:#0a0a0a;
  color:white;
  margin:0;
}

.header{
  padding:15px;
  background:#1a0000;
  color:gold;
  display:flex;
  gap:10px;
}

.back{
  cursor:pointer;
}

.container{
  padding:15px;
  padding-bottom:100px;
}

.card{
  background:#1a0000;
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
}

.copy-box{
  background:#2b0000;
  padding:10px;
  border-radius:10px;
  display:flex;
  justify-content:space-between;
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:10px;
  background:gold;
}

.bottom{
  position:fixed;
  bottom:0;
  width:100%;
  background:#1a0000;
  padding:10px;
}
</style>
</head>

<body>

<div class="header">
  <span class="back" onclick="history.back()">←</span>
  Pembayaran
</div>

<div class="container">

<div class="card">
  <p>Username: <b id="username"></b></p>
  <p>Nominal: <b id="nominal"></b></p>
  <p>Total: Rp <b id="price"></b></p>
  <p>Invoice: <b id="invoice"></b></p>
</div>

<div class="card" id="paymentBox">Loading...</div>

</div>

<div class="bottom">
  <button onclick="confirmPay()">Saya Sudah Bayar</button>
</div>

<script>
const BIN_ID="69fba662c0954111d8e84677";
const BIN_ID_TRANSAKSI="ISI_BIN_TRANSAKSI";
const API_KEY="$2a$10$b7426vCN3qvmHEGqIaeofuk0b.FXiKdEHj3Nh3zapOGnat.kn3TaW";

const p=new URLSearchParams(location.search);
const username=p.get("username");
const nominal=p.get("nominal");
const price=p.get("price");
const paymentId=p.get("paymentId");

document.getElementById("username").textContent=username;
document.getElementById("nominal").textContent=nominal;
document.getElementById("price").textContent=Number(price).toLocaleString();

const invoice="INV"+Date.now();
document.getElementById("invoice").textContent=invoice;

async function loadPayment(){
  const res=await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`,{
    headers:{ "X-Master-Key": API_KEY }
  });
  const data=await res.json();
  const payments=data.record.payments;

  const selected=payments.find(p=>p.id===paymentId && p.enabled);

  const box=document.getElementById("paymentBox");

  if(!selected){
    box.innerHTML="Metode tidak tersedia";
    return;
  }

  if(selected.id==="bank"||selected.id==="va"){
    box.innerHTML=`
      <h3>${selected.name}</h3>
      <div class="copy-box">
        <span>${selected.account}</span>
        <button onclick="copyText('${selected.account}')">Copy</button>
      </div>
      <p>a/n ${selected.owner}</p>
    `;
  }

  if(selected.id==="qr"){
    box.innerHTML=`
      <h3>${selected.name}</h3>
      <img src="${selected.image}" style="width:100%;">
    `;
  }
}

function copyText(t){
  navigator.clipboard.writeText(t);
  alert("Disalin!");
}

function confirmPay(){
  localStorage.setItem("notif","Pesanan menunggu konfirmasi admin");
  window.location.href="index.html";
}

loadPayment();
</script>

</body>
</html>
